<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transportes Lucas SpA</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1c1c27;
    --border: #2a2a3a;
    --accent: #f5a623;
    --accent2: #e8471a;
    --text: #f0f0f5;
    --muted: #7a7a9a;
    --success: #2ecc71;
    --danger: #e74c3c;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--surface) 0%, #1a1020 100%);
    border-bottom: 2px solid var(--accent);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 48px; height: 48px;
    background: #fff;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .logo-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
    line-height: 1;
  }
  .logo-text span { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
  .header-total {
    text-align: right;
  }
  .header-total .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .header-total .amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--accent);
  }
  .header-total .sublabel { font-size: 9px; color: var(--muted); opacity: 0.7; }

  /* NAV */
  nav {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  nav button {
    flex: none;
    padding: 12px 20px;
    background: none;
    border: none;
    color: #c0c0d0;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
  }
  nav button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* MAIN */
  main { padding: 16px; max-width: 700px; margin: 0 auto; }

  /* SECTION */
  .section { display: none; }
  .section.active { display: block; }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* FORM */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
  input, select, textarea {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    transition: border-color 0.2s;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  select option { background: var(--surface); }
  .type-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }
  .type-btn {
    padding: 10px;
    border-radius: 8px;
    border: 2px solid #444455;
    background: var(--surface);
    color: #d0d0e0;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .type-btn.active-ingreso { border-color: var(--success); color: var(--success); background: rgba(46,204,113,0.08); }
  .type-btn.active-gasto { border-color: var(--danger); color: var(--danger); background: rgba(231,76,60,0.08); }

  .btn {
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    margin-top: 12px;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-danger { background: var(--danger); color: #fff; width: auto; margin-top: 0; padding: 6px 12px; font-size: 12px; }
  .btn-export { background: var(--surface); border: 1px solid var(--border); color: var(--text); }

  /* REGISTROS */
  .mes-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--accent);
    padding: 14px 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .mes-total-badge {
    font-size: 13px;
    background: rgba(245,166,35,0.15);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
  }
  .registro-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .reg-left { flex: 1; }
  .reg-detalle { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .reg-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
  .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .badge-fecha { background: rgba(255,255,255,0.07); color: var(--muted); }
  .badge-cliente { background: rgba(245,166,35,0.12); color: var(--accent); }
  .badge-pago { background: rgba(46,204,113,0.12); color: var(--success); }
  .badge-hora { background: rgba(255,255,255,0.05); color: var(--muted); }
  .badge-boleta { background: rgba(100,150,255,0.12); color: #7ab3ff; }
  .reg-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .reg-monto {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    white-space: nowrap;
  }
  .monto-ingreso { color: var(--success); }
  .monto-gasto { color: var(--danger); }

  /* RESUMEN STATS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 24px; }
  .stat-value.green { color: var(--success); }
  .stat-value.red { color: var(--danger); }
  .stat-value.orange { color: var(--accent); }
  .stat-value.white { color: var(--text); }

  /* TABLA CLIENTES */
  .cliente-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
  }
  .cliente-name { font-weight: 500; font-size: 14px; }
  .cliente-stats { display: flex; gap: 14px; font-size: 13px; }
  .cliente-monto { font-family: 'Bebas Neue', sans-serif; font-size: 17px; color: var(--accent); }
  .cliente-count { color: var(--muted); font-size: 12px; }

  /* MES SELECTOR */
  .mes-selector {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 14px;
    -webkit-overflow-scrolling: touch;
  }
  .mes-chip {
    flex: none;
    padding: 6px 14px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .mes-chip.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

  /* SEARCH */
  .search-bar {
    position: relative;
    margin-bottom: 14px;
  }
  .search-bar input { padding-left: 36px; }
  .search-bar .icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 10px; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--success);
    color: #fff;
    padding: 12px 24px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 14px;
    transition: transform 0.3s ease;
    z-index: 9999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--danger); }

  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .filter-row select { flex: 1; }

  @media (max-width: 480px) {
    .form-grid { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

<header>

        <text x="56" y="74" font-family="Georgia, serif" font-size="64" fill="#333">L</text>
      </svg>
    </div>
    <div class="logo-text">
      <h1>Transportes Lucas SpA</h1>
      <span>GESTIÓN DE SERVICIOS</span>
    </div>
  </div>
  <div class="header-total">
    <div class="label">Balance <span id="headerMesLabel">este mes</span></div>
    <div class="amount" id="headerBalance">$0</div>
    <div class="sublabel" id="headerSubLabel"></div>
  </div>
</header>

<nav>
  <button class="active" onclick="showSection('agregar')">➕ Agregar</button>
  <button onclick="showSection('registros')">📋 Registros</button>
  <button onclick="showSection('resumen')">📊 Resumen</button>
  <button onclick="showSection('clientes')">👥 Clientes</button>
</nav>

<main>

  <!-- AGREGAR -->
  <div class="section active" id="sec-agregar">
    <div class="card">
      <div class="card-title">📝 Nuevo Registro</div>

      <div class="type-toggle">
        <button class="type-btn active-ingreso" id="btn-ingreso" onclick="setTipo('ingreso')">✅ INGRESO</button>
        <button class="type-btn" id="btn-gasto" onclick="setTipo('gasto')">💸 GASTO</button>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Fecha</label>
          <input type="date" id="f-fecha">
        </div>
        <div class="form-group">
          <label>Monto ($)</label>
          <input type="number" id="f-monto" placeholder="Ej: 40000">
        </div>
        <div class="form-group full">
          <label>Detalle</label>
          <input type="text" id="f-detalle" placeholder="Descripción del servicio o gasto">
        </div>
        <div class="form-group" id="g-cliente">
          <label>Cliente</label>
          <input type="text" id="f-cliente" placeholder="Ej: Monte Olimpo" list="clientes-list">
          <datalist id="clientes-list"></datalist>
        </div>
        <div class="form-group">
          <label>Hora</label>
          <input type="text" id="f-hora" placeholder="Ej: 9AM-2PM">
        </div>
        <div class="form-group">
          <label>Pago</label>
          <select id="f-pago">
            <option value="LISTO">LISTO</option>
            <option value="OK">OK</option>
            <option value="PENDIENTE">PENDIENTE</option>
          </select>
        </div>
        <div class="form-group" id="g-boleta">
          <label>Boleta / Factura</label>
          <select id="f-boleta">
            <option value="">No</option>
            <option value="SI">Boleta</option>
            <option value="FACTURA">Factura</option>
          </select>
        </div>
        <div class="form-group full" id="g-categoria" style="display:none">
          <label>Categoría Gasto</label>
          <select id="f-categoria">
            <option value="Combustible">Combustible</option>
            <option value="Mantención">Mantención</option>
            <option value="Peaje">Peaje</option>
            <option value="Peoneta">Peoneta</option>
            <option value="Seguro">Seguro</option>
            <option value="Repuestos">Repuestos</option>
            <option value="Otro">Otro</option>
          </select>
        </div>
      </div>

      <button class="btn btn-primary" onclick="guardarRegistro()">💾 GUARDAR REGISTRO</button>
    </div>
  </div>

  <!-- REGISTROS -->
  <div class="section" id="sec-registros">
    <div class="search-bar">
      <span class="icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Buscar servicio, cliente..." oninput="renderRegistros()">
    </div>
    <div class="filter-row">
      <select id="filtroTipo" onchange="renderRegistros()">
        <option value="">Todos</option>
        <option value="ingreso">Solo Ingresos</option>
        <option value="gasto">Solo Gastos</option>
      </select>
      <select id="filtroMes" onchange="renderRegistros()">
        <option value="">Todos los meses</option>
      </select>
    </div>
    <div id="registros-list"></div>
  </div>

  <!-- RESUMEN -->
  <div class="section" id="sec-resumen">
    <div class="mes-selector" id="mes-chips"></div>
    <div id="resumen-content"></div>
  </div>

  <!-- CLIENTES -->
  <div class="section" id="sec-clientes">
    <div id="clientes-content"></div>
  </div>

</main>

<div class="toast" id="toast"></div>

// ==================== STORAGE ====================
const STORAGE_KEY = 'transportes_lucas_spa_v1';

function cargarDatos() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    return JSON.parse(raw);
  } catch { return []; }
}

function guardarDatos(datos) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(datos));
}

function getTodos() {
  const guardados = cargarDatos();
  // Combinar histórico + guardados, evitar duplicados por id
  const idsGuardados = new Set(guardados.map(r => r.id));
  const hist = HISTORICO.filter(r => !idsGuardados.has(r.id));
  return [...hist, ...guardados].sort((a,b) => a.fecha.localeCompare(b.fecha));
}

// ==================== ESTADO ====================
let tipoActual = 'ingreso';
let mesResumenActual = null;

// ==================== INIT ====================
document.addEventListener('DOMContentLoaded', () => {
  // Fecha de hoy por defecto
  document.getElementById('f-fecha').value = new Date().toISOString().split('T')[0];
  actualizarHeaderBalance();
  renderFiltroMes();
  renderMesChips();
  actualizarDatalist();
});

// ==================== TIPO ====================
function setTipo(tipo) {
  tipoActual = tipo;
  const btnI = document.getElementById('btn-ingreso');
  const btnG = document.getElementById('btn-gasto');
  const gCat = document.getElementById('g-categoria');
  const gCliente = document.getElementById('g-cliente');
  const gBoleta = document.getElementById('g-boleta');

  if (tipo === 'ingreso') {
    btnI.className = 'type-btn active-ingreso';
    btnG.className = 'type-btn';
    gCat.style.display = 'none';
    gCliente.style.display = '';
    gBoleta.style.display = '';
  } else {
    btnG.className = 'type-btn active-gasto';
    btnI.className = 'type-btn';
    gCat.style.display = '';
    gCliente.style.display = 'none';
    gBoleta.style.display = 'none';
  }
}

// ==================== GUARDAR ====================
function guardarRegistro() {
  const fecha = document.getElementById('f-fecha').value;
  const monto = parseInt(document.getElementById('f-monto').value);
  const detalle = document.getElementById('f-detalle').value.trim().toUpperCase();
  const cliente = document.getElementById('f-cliente').value.trim().toUpperCase();
  const hora = document.getElementById('f-hora').value.trim();
  const pago = document.getElementById('f-pago').value;
  const boleta = document.getElementById('f-boleta').value;
  const categoria = document.getElementById('f-categoria').value;

  if (!fecha || !monto || !detalle) {
    showToast('Completa fecha, monto y detalle', true);
    return;
  }

  const nuevo = {
    id: 'r_' + Date.now(),
    tipo: tipoActual,
    fecha, monto, detalle, hora, pago, boleta,
    cliente: tipoActual === 'ingreso' ? cliente : '',
    categoria: tipoActual === 'gasto' ? categoria : ''
  };

  const datos = cargarDatos();
  datos.push(nuevo);
  guardarDatos(datos);

  // Limpiar form
  document.getElementById('f-monto').value = '';
  document.getElementById('f-detalle').value = '';
  document.getElementById('f-cliente').value = '';
  document.getElementById('f-hora').value = '';
  document.getElementById('f-fecha').value = new Date().toISOString().split('T')[0];

  actualizarHeaderBalance();
  renderFiltroMes();
  renderMesChips();
  actualizarDatalist();
  showToast('✅ Registro guardado!');
}

// ==================== ELIMINAR ====================
function eliminarRegistro(id) {
  if (!confirm('¿Eliminar este registro?')) return;
  // Solo se pueden eliminar registros guardados (no históricos)
  const datos = cargarDatos().filter(r => r.id !== id);
  guardarDatos(datos);
  actualizarHeaderBalance();
  renderRegistros();
  renderFiltroMes();
  renderMesChips();
  showToast('Registro eliminado');
}

// ==================== RENDER REGISTROS ====================
function renderRegistros() {
  const todos = getTodos();
  const busqueda = document.getElementById('searchInput').value.toLowerCase();
  const filtroTipo = document.getElementById('filtroTipo').value;
  const filtroMes = document.getElementById('filtroMes').value;

  let filtrados = todos.filter(r => {
    const matchBusq = !busqueda ||
      r.detalle.toLowerCase().includes(busqueda) ||
      (r.cliente||'').toLowerCase().includes(busqueda);
    const matchTipo = !filtroTipo || r.tipo === filtroTipo;
    const matchMes = !filtroMes || r.fecha.substring(0,7) === filtroMes;
    return matchBusq && matchTipo && matchMes;
  });

  // Agrupar por mes (descendente)
  const porMes = {};
  filtrados.forEach(r => {
    const k = r.fecha.substring(0,7);
    if (!porMes[k]) porMes[k] = [];
    porMes[k].push(r);
  });

  const meses = Object.keys(porMes).sort().reverse();
  const container = document.getElementById('registros-list');

  if (meses.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>No hay registros</div></div>';
    return;
  }

  container.innerHTML = meses.map(mes => {
    const regs = porMes[mes];
    const totalIngresos = regs.filter(r=>r.tipo==='ingreso').reduce((s,r)=>s+r.monto,0);
    const totalGastos = regs.filter(r=>r.tipo==='gasto').reduce((s,r)=>s+r.monto,0);
    const balance = totalIngresos - totalGastos;

    return `
      <div class="mes-header">
        <span>${formatMesLabel(mes)}</span>
        <span class="mes-total-badge" style="color:${balance>=0?'#2ecc71':'#e74c3c'}">${balance>=0?'+':''}${fmt(balance)}</span>
      </div>
      ${regs.reverse().map(r => `
        <div class="registro-item">
          <div class="reg-left">
            <div class="reg-detalle">${r.detalle}</div>
            <div class="reg-meta">
              ${r.fecha ? `<span class="badge badge-fecha">${r.fecha.split('-').reverse().join('/')}</span>` : ''}
              ${r.cliente ? `<span class="badge badge-cliente">${r.cliente}</span>` : ''}
              ${r.categoria ? `<span class="badge badge-cliente" style="background:rgba(231,76,60,0.12);color:#e74c3c">${r.categoria}</span>` : ''}
              ${r.hora ? `<span class="badge badge-hora">${r.hora}</span>` : ''}
              ${r.pago ? `<span class="badge badge-pago">${r.pago}</span>` : ''}
              ${r.boleta && r.boleta !== '' && r.boleta !== 'NO' ? `<span class="badge badge-boleta">📄 ${r.boleta === 'SI' ? 'BOLETA' : r.boleta}</span>` : ''}
            </div>
          </div>
          <div class="reg-right">
            <span class="reg-monto ${r.tipo==='ingreso'?'monto-ingreso':'monto-gasto'}">
              ${r.tipo==='gasto'?'-':''}${fmt(r.monto)}
            </span>
            ${!r.id.startsWith('h') ? `<button class="btn btn-danger" onclick="eliminarRegistro('${r.id}')">🗑</button>` : ''}
          </div>
        </div>
      `).join('')}
    `;
  }).join('');
}

// ==================== RESUMEN ====================
function renderMesChips() {
  const todos = getTodos();
  const meses = [...new Set(todos.map(r => r.fecha.substring(0,7)))].sort().reverse();

  if (!mesResumenActual || !meses.includes(mesResumenActual)) {
    mesResumenActual = meses[0] || null;
  }

  document.getElementById('mes-chips').innerHTML = meses.map(m => `
    <div class="mes-chip ${m === mesResumenActual ? 'active' : ''}" onclick="selectMesResumen('${m}')">
      ${formatMesLabel(m)}
    </div>
  `).join('');

  renderResumen();
}

function selectMesResumen(mes) {
  mesResumenActual = mes;
  renderMesChips();
}

function renderResumen() {
  if (!mesResumenActual) {
    document.getElementById('resumen-content').innerHTML = '<div class="empty-state"><div class="icon">📊</div><div>Sin datos</div></div>';
    return;
  }

  const todos = getTodos().filter(r => r.fecha.substring(0,7) === mesResumenActual);
  const ingresos = todos.filter(r => r.tipo === 'ingreso');
  const gastos = todos.filter(r => r.tipo === 'gasto');
  const totalI = ingresos.reduce((s,r)=>s+r.monto,0);
  const totalG = gastos.reduce((s,r)=>s+r.monto,0);
  const balance = totalI - totalG;

  // Por cliente
  const porCliente = {};
  ingresos.forEach(r => {
    const c = r.cliente || 'Sin cliente';
    if (!porCliente[c]) porCliente[c] = 0;
    porCliente[c] += r.monto;
  });
  const topClientes = Object.entries(porCliente).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Balance total histórico
  const todosH = getTodos();
  const totalIH = todosH.filter(r=>r.tipo==='ingreso').reduce((s,r)=>s+r.monto,0);
  const totalGH = todosH.filter(r=>r.tipo==='gasto').reduce((s,r)=>s+r.monto,0);
  const balanceH = totalIH - totalGH;
  const mesesCount = [...new Set(todosH.map(r=>r.fecha.substring(0,7)))].length;

  document.getElementById('resumen-content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Ingresos</div>
        <div class="stat-value green">${fmt(totalI)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Gastos</div>
        <div class="stat-value red">${fmt(totalG)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Balance</div>
        <div class="stat-value ${balance>=0?'green':'red'}">${fmt(balance)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Servicios</div>
        <div class="stat-value white">${ingresos.length}</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🏆 Top Clientes del Mes</div>
      ${topClientes.length === 0 ? '<div style="color:var(--muted);font-size:13px">Sin datos de clientes</div>' :
        topClientes.map(([c,m]) => `
          <div class="cliente-row">
            <span class="cliente-name">${c}</span>
            <span class="cliente-monto">${fmt(m)}</span>
          </div>
        `).join('')}
    </div>

    <div class="card">
      <div class="card-title">📤 Exportar</div>
      <button class="btn btn-export" onclick="exportarMes()">⬇️ Descargar Excel del mes</button>
    </div>

    <div class="card" style="border-color: rgba(245,166,35,0.3);">
      <div class="card-title">🏦 Balance Total Histórico</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Ingresos</div>
          <div class="stat-value green" style="font-size:18px">${fmt(totalIH)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Gastos</div>
          <div class="stat-value red" style="font-size:18px">${fmt(totalGH)}</div>
        </div>
      </div>
      <div class="stat-card" style="margin-top:8px;background:rgba(245,166,35,0.06);border-color:rgba(245,166,35,0.2)">
        <div class="stat-label">Balance Neto · ${mesesCount} meses registrados</div>
        <div class="stat-value ${balanceH>=0?'green':'red'}" style="font-size:30px">${balanceH>=0?'+':''}${fmt(balanceH)}</div>
      </div>
    </div>
  `;
}

// ==================== CLIENTES ====================
function renderClientes() {
  const todos = getTodos().filter(r => r.tipo === 'ingreso' && r.cliente);
  const porCliente = {};
  todos.forEach(r => {
    const c = r.cliente;
    if (!porCliente[c]) porCliente[c] = { total: 0, count: 0 };
    porCliente[c].total += r.monto;
    porCliente[c].count++;
  });

  const sorted = Object.entries(porCliente).sort((a,b)=>b[1].total-a[1].total);

  document.getElementById('clientes-content').innerHTML = `
    <div class="card">
      <div class="card-title">👥 Ranking de Clientes</div>
      ${sorted.map(([c, d], i) => `
        <div class="cliente-row">
          <div>
            <span style="color:var(--accent);font-weight:700;margin-right:8px">#${i+1}</span>
            <span class="cliente-name">${c}</span>
            <div class="cliente-count">${d.count} servicio${d.count>1?'s':''}</div>
          </div>
          <span class="cliente-monto">${fmt(d.total)}</span>
        </div>
      `).join('')}
    </div>
  `;
}

// ==================== HELPERS ====================
function fmt(n) {
  return '$' + Math.abs(n).toLocaleString('es-CL');
}

function formatMesLabel(ym) {
  const [y,m] = ym.split('-');
  const meses = ['','ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
  return `${meses[parseInt(m)]} ${y}`;
}

function actualizarHeaderBalance() {
  const todos = getTodos();
  const mesActual = new Date().toISOString().substring(0,7);
  const delMes = todos.filter(r => r.fecha.substring(0,7) === mesActual);
  const totalI = delMes.filter(r=>r.tipo==='ingreso').reduce((s,r)=>s+r.monto,0);
  const totalG = delMes.filter(r=>r.tipo==='gasto').reduce((s,r)=>s+r.monto,0);
  const balance = totalI - totalG;
  const el = document.getElementById('headerBalance');
  el.textContent = fmt(balance);
  el.style.color = balance >= 0 ? 'var(--success)' : 'var(--danger)';
  document.getElementById('headerMesLabel').textContent = formatMesLabel(mesActual);
  document.getElementById('headerSubLabel').textContent = `${fmt(totalI)} ingresos · ${fmt(totalG)} gastos`;
}

function renderFiltroMes() {
  const todos = getTodos();
  const meses = [...new Set(todos.map(r => r.fecha.substring(0,7)))].sort().reverse();
  const sel = document.getElementById('filtroMes');
  const val = sel.value;
  sel.innerHTML = '<option value="">Todos los meses</option>' +
    meses.map(m => `<option value="${m}" ${m===val?'selected':''}>${formatMesLabel(m)}</option>`).join('');
}

function actualizarDatalist() {
  const todos = getTodos();
  const clientes = [...new Set(todos.filter(r=>r.cliente).map(r=>r.cliente))];
  document.getElementById('clientes-list').innerHTML =
    clientes.map(c => `<option value="${c}">`).join('');
}

function showToast(msg, error=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (error?' error':'') + ' show';
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ==================== EXPORTAR ====================
function exportarMes() {
  if (!mesResumenActual) return;
  const todos = getTodos().filter(r => r.fecha.substring(0,7) === mesResumenActual);
  let csv = 'FECHA,TIPO,DETALLE,MONTO,HORA,PAGO,BOLETA,CLIENTE,CATEGORIA\n';
  todos.forEach(r => {
    csv += `${r.fecha},${r.tipo.toUpperCase()},"${r.detalle}",${r.monto},${r.hora||''},${r.pago||''},${r.boleta||''},${r.cliente||''},${r.categoria||''}\n`;
  });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `TransportesLucas_${mesResumenActual}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ==================== NAV ====================
function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  event.target.classList.add('active');

  if (name === 'registros') renderRegistros();
  if (name === 'resumen') renderMesChips();
  if (name === 'clientes') renderClientes();
}
</script>
